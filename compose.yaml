x-spark-dependencies: &spark_deps
  postgres: { condition: service_healthy }
  clickhouse: { condition: service_healthy }
  cassandra: { condition: service_healthy }
  mongodb: { condition: service_healthy }

services:
  postgres:
    image: postgres:18
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d
      - ./data:/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    container_name: clickhouse_db
    environment:
      CLICKHOUSE_USER: user
      CLICKHOUSE_PASSWORD: password
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8123/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
  cassandra:
    image: cassandra:5.0
    container_name: cassandra_db
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "Spark Cluster"
      CASSANDRA_DC: "datacenter1"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES'"]
      interval: 15s
      timeout: 5s
      retries: 5
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: user 
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark-master:
    build: .
    depends_on:
      postgres: 
        condition: service_healthy
      clickhouse: 
        condition: service_healthy
      cassandra: 
        condition: service_healthy
      mongodb: 
        condition: service_healthy

    volumes:
      - ./spark:/app
      - spark-data:/opt/spark/work-dir
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    build: .
    depends_on:
      - spark-master
    volumes:
      - ./spark:/app
      - spark-data:/opt/spark/work-dir
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

  jupyter:
    build: .
    ports:
      - "8888:8888"
      - "9001:9001"
    volumes:
      - ./notebooks:/app/notebooks
      - spark-data:/opt/spark/work-dir
    depends_on:
      - spark-master
      - spark-worker
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root 
      --NotebookApp.token='' --NotebookApp.password=''

volumes:
  spark-data:

